{% extends "base.html" %}
{% block title %}Definition of Done{% endblock %}
{% block content %}

<div class="page-hd">
  <h1 class="page-title">Definition of Done</h1>
</div>

<p style="font-size:13px;color:var(--text-2);margin-bottom:18px;font-weight:500">
  A story is only <strong style="color:var(--brand)">DONE</strong>
  when every criterion below is checked.
</p>

<form method="POST" action="{{ url_for('dashboard.dod_save') }}">
  <div class="dod-list" style="margin-bottom:16px">
    {% for item in data.dod %}
    <label class="dod-item {% if item.done %}checked{% endif %}">
      <input type="checkbox" name="checked"
             value="{{ item.text }}" {% if item.done %}checked{% endif %} />
      <span>{{ item.text }}</span>
      {% if item.done %}
        <span class="pri" style="background:#e8faf2;color:#047a45;margin-left:auto">✓ Done</span>
      {% endif %}
    </label>
    {% endfor %}
  </div>
  <button type="submit" class="btn-add">Save checklist</button>
</form>
{% endblock %}
